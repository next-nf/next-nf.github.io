<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en_US' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  <style>
    :root { color-scheme: light dark; }
    body { max-width: 46rem; margin: 2.5rem auto; padding: 0 1.25rem;
           font: 16px/1.6 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    h1 { line-height: 1.15; }
    table { border-collapse: collapse; width: 100%; margin: 1.5rem 0; }
    th, td { text-align: left; padding: .5rem .6rem;
             border-bottom: 1px solid #8884; vertical-align: top; }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: .9em; }
    a { color: inherit; }
    footer { margin-top: 2.5rem; font-style: italic; opacity: .8; }
  </style>
</head>
<body>
  {{ content }}
</body>
</html>
